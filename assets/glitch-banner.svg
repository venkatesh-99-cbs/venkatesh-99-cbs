<svg viewBox="0 0 900 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1b1f"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00ff9d" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <clipPath id="frame">
      <rect x="2" y="2" width="896" height="186" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="190" fill="url(#bgGrad)"/>
    <rect width="900" height="190" fill="url(#grid)"/>

    <!-- scanline sweep -->
    <rect x="0" y="0" width="900" height="5" fill="#00d9ff" opacity="0.18">
      <animate attributeName="y" values="0;190;0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- glitch text layers -->
    <text x="450" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="40" fill="#ff005c" opacity="0.7">
      VENKATESH TAMBABATHULA
      <animateTransform attributeName="transform" type="translate" values="-2,0; 1,0; -1,0; 2,0; -2,0" dur="2.6s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="40" fill="#00d9ff" opacity="0.7">
      VENKATESH TAMBABATHULA
      <animateTransform attributeName="transform" type="translate" values="2,0; -1,0; 1,0; -2,0; 2,0" dur="2.6s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="40" fill="#00ff9d">
      VENKATESH TAMBABATHULA
    </text>

    <!-- subtext -->
    <text x="450" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#7fffd4" letter-spacing="3">
      SECURITY ENGINEER // FULL-STACK DEVELOPER
    </text>

    <!-- boot line -->
    <text x="450" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#00ff9d" opacity="0.85">
      &gt; access_granted<tspan fill="#00ff9d">_</tspan>
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </text>

    <!-- corner brackets -->
    <path d="M14 14 L14 34 M14 14 L34 14" stroke="#00ff9d" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M886 14 L886 34 M886 14 L866 14" stroke="#00ff9d" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M14 176 L14 156 M14 176 L34 176" stroke="#00ff9d" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M886 176 L886 156 M886 176 L866 176" stroke="#00ff9d" stroke-width="2" fill="none" opacity="0.8"/>
  </g>

  <rect x="2" y="2" width="896" height="186" rx="10" fill="none" stroke="#00ff9d" stroke-opacity="0.35" stroke-width="1.5"/>
</svg>
