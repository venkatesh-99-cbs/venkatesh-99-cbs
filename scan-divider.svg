<svg viewBox="0 0 1200 14" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="10%" stop-color="#00ff9d" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="0.55"/>
      <stop offset="90%" stop-color="#00ff9d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff9d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="6" width="1200" height="2" fill="url(#track)"/>

  <rect x="-200" y="3" width="180" height="8" fill="url(#pulseGrad)">
    <animate attributeName="x" values="-200;1200" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <circle cx="0" cy="7" r="3" fill="#00ff9d">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1200" cy="7" r="3" fill="#00d9ff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/>
  </circle>
</svg>
